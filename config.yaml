# ═══════════════════════════════════════════════════════════
# SERVER CONFIGURATION
# ═══════════════════════════════════════════════════════════
server:
  port: 8081
  host: "0.0.0.0"
  context_size: 131072
  gpu_layers: 999
  batch_size: 512
  ubatch_size: 256
  flash_attn: "auto"
  threads: null  # null = auto-detect

# ═══════════════════════════════════════════════════════════
# REASONING CONFIGURATION
# ═══════════════════════════════════════════════════════════
reasoning:
  format: "none"  # "none" or "deepseek"
  budget: 0  # -1 = unlimited, 0 = disabled
  enable_thinking: false

# ═══════════════════════════════════════════════════════════
# API CONFIGURATION
# ═══════════════════════════════════════════════════════════
api:
  base_url: "http://localhost:8080/v1"
  key: "not-needed"

# ═══════════════════════════════════════════════════════════
# PATHS
# ═══════════════════════════════════════════════════════════
paths:
  install_dir: "/usr/local/bin"
  build_dir: "$HOME/llama.cpp"
  log_file: "/tmp/llama-server.log"
  pid_file: "/tmp/llama-server.pid"
  venv_dir: "./.venv"
  benchmark_dir: "./benchmarks"

# ═══════════════════════════════════════════════════════════
# BENCHMARKS
# ═══════════════════════════════════════════════════════════
benchmarks:
  repetitions: 3

# ═══════════════════════════════════════════════════════════
# SYSTEM
# ═══════════════════════════════════════════════════════════
system:
  min_ram_gb: 16
  recommended_ram_gb: 32
  min_disk_gb: 25

# ═══════════════════════════════════════════════════════════
# FEATURES
# ═══════════════════════════════════════════════════════════
features:
  enable_webui: true
  enable_chat_cli: true
  enable_agent: true
  enable_benchmarks: true

# ═══════════════════════════════════════════════════════════
# ADVANCED
# ═══════════════════════════════════════════════════════════
advanced:
  temperature: 0.7
  top_p: 0.9
  repeat_penalty: 1.1
  max_tokens: -1

# ═══════════════════════════════════════════════════════════
# CLAUDE CODE CLI INTEGRATION
# ═══════════════════════════════════════════════════════════
claude_code:
  # Enable Claude Code integration
  enabled: true
  
  # Disable telemetry
  disable_telemetry: true
  
  # Dummy auth token (required by Claude CLI)
  auth_token: "dummy"
  
  # Timeout in seconds
  timeout: 300
  
  # Max tokens for responses
  max_tokens: 8192
  
  # Model alias (what Claude Code will see)
  # Leave empty to use actual model name
  alias: ""

# ═══════════════════════════════════════════════════════════
# END OF CONFIGURATION
# ═══════════════════════════════════════════════════════════

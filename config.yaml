active_model: qwen3.5-27b-distilled
advanced:
  max_tokens: -1
  repeat_penalty: 1.1
  temperature: 0.7
  top_p: 0.9
api:
  base_url: http://localhost:8081/v1
  key: not-needed
benchmarks:
  repetitions: 3
claude_code:
  alias: ''
  auth_token: dummy
  disable_telemetry: true
  enabled: true
  max_tokens: 8192
  timeout: 300
features:
  enable_agent: true
  enable_benchmarks: true
  enable_chat_cli: true
  enable_webui: true
models:
  # Main recommended model - best balance of speed and quality
  qwen-35b-a3b:
    description: Qwen3.5 35B MoE - Best balance of speed and quality
    hf_file: Qwen3.5-35B-A3B-UD-Q4_K_XL.gguf
    hf_repo: unsloth/Qwen3.5-35B-A3B-GGUF
    name: Qwen3.5-35B-A3B-UD-Q4_K_XL.gguf
    path: $HOME/models/Qwen3.5-35B-A3B-UD-Q4_K_XL.gguf
    ram_required_gb: 32
    size_gb: 23

  # New! Qwen3.5 9B - Excellent speed/quality balance, lower RAM
  qwen-3-9b:
    description: Qwen3.5 9B - Fast and efficient, great for most tasks
    hf_file: Qwen3.5-9B-UD-Q4_K_XL.gguf
    hf_repo: unsloth/Qwen3.5-9B-GGUF
    name: Qwen3.5-9B-UD-Q4_K_XL.gguf
    path: $HOME/models/Qwen3.5-9B-UD-Q4_K_XL.gguf
    ram_required_gb: 16
    size_gb: 7

  # Reasoning distilled model by Jackrong
  qwen3.5-27b-distilled:
    description: Qwen3.5 27B Distilled - Reasoning model distilled from Claude 4.6 Opus
    hf_file: Qwen3.5-27B.Q4_K_M.gguf
    hf_repo: Jackrong/Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-GGUF
    name: Qwen3.5-27B.Q4_K_M.gguf
    path: $HOME/models/Qwen3.5-27B.Q4_K_M.gguf
    ram_required_gb: 32
    size_gb: 17

  # Fast model for quick tasks - low RAM usage
  llama-3-8b:
    description: Llama 3 8B - Fast, low RAM usage
    hf_file: Llama-3-8B-Instruct-Q4_K_M.gguf
    hf_repo: unsloth/Llama-3-8B-Instruct-GGUF
    name: Llama-3-8B-Instruct-Q4_K_M.gguf
    path: $HOME/models/Llama-3-8B-Instruct-Q4_K_M.gguf
    ram_required_gb: 16
    size_gb: 5

  # Minimal model for resource-constrained systems
  mistral-7b:
    description: Mistral 7B - Very fast, minimal RAM
    hf_file: Mistral-7B-Instruct-v0.3-Q4_K_M.gguf
    hf_repo: unsloth/Mistral-7B-Instruct-v0.3-GGUF
    name: Mistral-7B-Instruct-v0.3-Q4_K_M.gguf
    path: $HOME/models/Mistral-7B-Instruct-v0.3-Q4_K_M.gguf
    ram_required_gb: 8
    size_gb: 4
paths:
  benchmark_dir: ./benchmarks
  build_dir: $HOME/llama.cpp
  install_dir: /usr/local/bin
  log_file: /tmp/llama-server.log
  pid_file: /tmp/llama-server.pid
  venv_dir: ./.venv
reasoning:
  budget: -1
  enable_thinking: true
  format: deepseek
server:
  batch_size: 512
  context_size: 131072
  flash_attn: auto
  gpu_layers: 999
  host: 0.0.0.0
  port: 8081
  threads: null
  ubatch_size: 256
system:
  min_disk_gb: 25
  min_ram_gb: 16
  recommended_ram_gb: 32
